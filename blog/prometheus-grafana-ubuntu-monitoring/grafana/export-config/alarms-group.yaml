apiVersion: 1
groups:
    - orgId: 1
      name: infra-1m
      folder: Infra Alerts
      interval: 1m
      rules:
        - uid: bfqomil4ul62od
          title: HostDown
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: up{job="ubuntu-node"} == 0
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: KeepLast
          execErrState: Alerting
          for: 1m
          keepFiringFor: 5m
          annotations:
            description: '{{ $labels.hostname }} / {{ $labels.instance }} 의 up 메트릭이 0입니다. 서버 전원, 네트워크, node_exporter, Prometheus scrape 상태를 확인하세요.'
            summary: 서버 또는 node_exporter가 응답하지 않습니다.
          labels:
            category: availability
            service: node
            severity: critical
            team: infra
          isPaused: false
          notification_settings:
            receiver: teams-infra
        - uid: dfqommpytsf0gd
          title: CPUHighWarning
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: |-
                    100 * (
                      1 - avg by(instance, hostname) (
                        rate(node_cpu_seconds_total{job="ubuntu-node", mode="idle"}[5m])
                      )
                    )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: KeepLast
          execErrState: Alerting
          for: 10m
          keepFiringFor: 5m
          annotations:
            description: '{{ $labels.hostname }} / {{ $labels.instance }} 의 CPU 사용률이 10분 이상 80%를 초과했습니다. 프로세스 부하, 컨테이너 runaway, 배치 작업을 확인하세요.'
            summary: CPU 사용률이 80%를 초과했습니다.
          labels:
            category: cpu
            service: node
            severity: warning
            team: infra
          isPaused: false
          notification_settings:
            receiver: teams-infra
        - uid: afqomqgr71kaod
          title: CPUHighCritical
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: |-
                    100 * (
                      1 - avg by(instance, hostname) (
                        rate(node_cpu_seconds_total{job="ubuntu-node", mode="idle"}[5m])
                      )
                    )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 90
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: KeepLast
          execErrState: Alerting
          for: 10m
          keepFiringFor: 5m
          annotations:
            description: '{{ $labels.hostname }} / {{ $labels.instance }} 의 CPU 사용률이 10분 이상 90%를 초과했습니다. 프로세스 부하, 컨테이너 runaway, 배치 작업을 확인하세요.'
            summary: CPU 사용률이 90%를 초과했습니다.
          labels:
            category: cpu
            service: node
            severity: critical
            team: infra
          isPaused: false
          notification_settings:
            receiver: teams-infra
        - uid: efqomwlpjpc00c
          title: MemoryHighWarning
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: |-
                    100 * (
                      1 - (
                        node_memory_MemAvailable_bytes{job="ubuntu-node"}
                        /
                        node_memory_MemTotal_bytes{job="ubuntu-node"}
                      )
                    )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 85
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: KeepLast
          execErrState: Alerting
          for: 10m
          keepFiringFor: 5m
          annotations:
            description: '{{ $labels.hostname }} / {{ $labels.instance }} 의 메모리 사용률이 10분 이상 85%를 초과했습니다. 메모리 누수, 컨테이너 제한, swap 사용량을 확인하세요.'
            summary: 메모리 사용률이 85%를 초과했습니다.
          labels:
            category: memory
            service: node
            severity: warning
            team: infra
          isPaused: false
          notification_settings:
            receiver: teams-infra
        - uid: cfqon00ibi2gwa
          title: MemoryHighCritical
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: |-
                    100 * (
                      1 - (
                        node_memory_MemAvailable_bytes{job="ubuntu-node"}
                        /
                        node_memory_MemTotal_bytes{job="ubuntu-node"}
                      )
                    )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 95
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: KeepLast
          execErrState: Alerting
          for: 5m
          keepFiringFor: 5m
          annotations:
            description: '{{ $labels.hostname }} / {{ $labels.instance }} 의 메모리 사용률이 5분 이상 95%를 초과했습니다. 메모리 누수, 컨테이너 제한, swap 사용량을 확인하세요.'
            summary: 메모리 사용률이 95%를 초과했습니다.
          labels:
            category: memory
            service: node
            severity: critical
            team: infra
          isPaused: false
          notification_settings:
            receiver: teams-infra
        - uid: dfqon374wrawwd
          title: DiskUsageHighWarning
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: |-
                    100 * (
                      1 - (
                        node_filesystem_avail_bytes{
                          job="ubuntu-node",
                          fstype!~"tmpfs|devtmpfs|overlay|squashfs|fuse.lxcfs",
                          mountpoint!~"/run.*|/snap.*|/var/lib/docker/overlay2.*"
                        }
                        /
                        node_filesystem_size_bytes{
                          job="ubuntu-node",
                          fstype!~"tmpfs|devtmpfs|overlay|squashfs|fuse.lxcfs",
                          mountpoint!~"/run.*|/snap.*|/var/lib/docker/overlay2.*"
                        }
                      )
                    )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 80
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: KeepLast
          execErrState: Alerting
          for: 10m
          keepFiringFor: 10m
          annotations:
            description: '{{ $labels.hostname }} / {{ $labels.instance }} 의 {{ $labels.mountpoint }} 마운트 사용률이 80%를 초과했습니다. Docker 로그, 이미지, 컨테이너, 오래된 파일을 확인하세요.'
            summary: 디스크 사용률이 80%를 초과했습니다.
          labels:
            category: disk
            service: node
            severity: warning
            team: infra
          isPaused: false
          notification_settings:
            receiver: teams-infra
        - uid: afqon76pino5cc
          title: DiskWillFillSoon
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: |-
                    predict_linear(
                      node_filesystem_avail_bytes{
                        job="ubuntu-node",
                        fstype!~"tmpfs|devtmpfs|overlay|squashfs|fuse.lxcfs",
                        mountpoint!~"/run.*|/snap.*|/var/lib/docker/overlay2.*"
                      }[6h],
                      24 * 3600
                    )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: lt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: KeepLast
          execErrState: Alerting
          for: 15m
          keepFiringFor: 30m
          annotations:
            description: '{{ $labels.hostname }} / {{ $labels.instance }} 의 {{ $labels.mountpoint }} 마운트가 최근 6시간 증가 추세 기준 24시간 안에 가득 찰 가능성이 있습니다. Docker 로그, 대용량 파일, 백업 파일, DB dump를 확인하세요.'
            summary: 24시간 안에 디스크가 가득 찰 것으로 예측됩니다.
          labels:
            category: disk
            service: node
            severity: critical
            team: infra
          isPaused: false
          notification_settings:
            receiver: teams-infra
